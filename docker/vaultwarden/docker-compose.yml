services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN}   # set in docker/.env
      SIGNUPS_ALLOWED: "true"
    volumes:
      - vaultwarden-data:/data

volumes:
  vaultwarden-data: